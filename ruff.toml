target-version = "py38"
exclude = [
    ".git",
    ".mypy_cache",
    ".pytest_cache",
    ".ruff_cache",
    "build",
    "dist",
    "logs",
    "plugins/installed",
    "temp",
]

[lint]
select = ["E4", "E7", "E9", "F"]

[lint.per-file-ignores]
"scripts/**/*.py" = ["E402"]
"tests/**/*.py" = ["E402"]
