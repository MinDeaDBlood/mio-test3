name: Build MIO-KITCHEN

on:
  push:
    tags:
      - 'v*'
      - 'CI_BUILD_*'
  workflow_dispatch:

permissions:
  contents: write

env:
  PYTHONDONTWRITEBYTECODE: '1'
  PYTHON_VERSION: '3.12'

jobs:
  build-windows:
    name: Windows x64
    runs-on: windows-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          architecture: x64

      - name: Install dependencies
        run: python -m pip install -r requirements.txt

      - name: Build Windows x64
        run: python build.py --target-os win --skip-install

      - name: Upload Windows artifact
        uses: actions/upload-artifact@v4
        with:
          name: MIO-KITCHEN-win.x64
          path: MIO-KITCHEN-win.x64.zip
          if-no-files-found: error

  build-linux:
    name: Ubuntu 24.04 x64
    runs-on: ubuntu-24.04

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y liblzo2-dev

      - name: Install dependencies
        run: python -m pip install -r requirements.txt

      - name: Build Ubuntu 24.04 x64
        run: python build.py --target-os ubuntu24.04 --skip-install

      - name: Upload Ubuntu artifact
        uses: actions/upload-artifact@v4
        with:
          name: MIO-KITCHEN-ubuntu24.04-x64
          path: MIO-KITCHEN-ubuntu24.04-x64.zip
          if-no-files-found: error

  build-macos:
    name: ${{ matrix.display_name }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - runner: macos-15-intel
            display_name: macOS 15 Intel x64
            expected_machine: x86_64
            artifact: MIO-KITCHEN-macos15-intel-x64
          - runner: macos-15
            display_name: macOS 15 ARM64
            expected_machine: arm64
            artifact: MIO-KITCHEN-macos15-arm64

    runs-on: ${{ matrix.runner }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Verify runner architecture
        run: |
          test "$(uname -m)" = "${{ matrix.expected_machine }}"
          sw_vers

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install dependencies
        run: python -m pip install -r requirements.txt

      - name: Build macOS 15
        run: python build.py --target-os macos15 --skip-install

      - name: Upload macOS artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: ${{ matrix.artifact }}.zip
          if-no-files-found: error

  release:
    name: Publish GitHub release
    needs:
      - build-windows
      - build-linux
      - build-macos
    runs-on: ubuntu-24.04
    if: startsWith(github.ref, 'refs/tags/v')

    steps:
      - name: Download build artifacts
        uses: actions/download-artifact@v4

      - name: Collect release archives
        run: |
          find . -mindepth 2 -type f -name '*.zip' -exec mv -t . {} +
          ls -la MIO-KITCHEN-*.zip

      - name: Upload release
        uses: ncipollo/release-action@v1
        with:
          allowUpdates: true
          omitBodyDuringUpdate: true
          removeArtifacts: true
          artifacts: MIO-KITCHEN-*.zip
