name: Build MIO-KITCHEN

on:
  push:
    tags:
      - 'v*'
      - 'CI_BUILD_*'
  workflow_dispatch:
    inputs:
      publish_release:
        description: Create or update a GitHub Release after all builds succeed
        required: true
        type: boolean
        default: true
      release_tag:
        description: Optional release tag. When empty, a tag is generated from the application version and run number
        required: false
        type: string
      prerelease:
        description: Mark a manually published release as a prerelease
        required: true
        type: boolean
        default: false

permissions:
  contents: write

env:
  PYTHONDONTWRITEBYTECODE: '1'
  PYTHON_VERSION: '3.12'

jobs:
  build-windows:
    name: Windows x64
    runs-on: windows-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          architecture: x64

      - name: Install dependencies
        run: python -m pip install -r requirements.txt

      - name: Build Windows x64
        run: python build.py --target-os win --skip-install

      - name: Upload Windows artifact
        uses: actions/upload-artifact@v4
        with:
          name: MIO-KITCHEN-win.x64
          path: MIO-KITCHEN-win.x64.zip
          if-no-files-found: error
          retention-days: 14

  build-linux:
    name: Ubuntu 24.04 x64
    runs-on: ubuntu-24.04

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y liblzo2-dev python3-tk

      - name: Install dependencies
        run: python -m pip install -r requirements.txt

      - name: Build Ubuntu 24.04 x64
        run: python build.py --target-os ubuntu24.04 --skip-install

      - name: Upload Ubuntu artifact
        uses: actions/upload-artifact@v4
        with:
          name: MIO-KITCHEN-ubuntu24.04-x64
          path: MIO-KITCHEN-ubuntu24.04-x64.zip
          if-no-files-found: error
          retention-days: 14

  build-macos:
    name: ${{ matrix.display_name }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - runner: macos-15-intel
            display_name: macOS 15 Intel x64
            expected_machine: x86_64
            artifact: MIO-KITCHEN-macos15-intel-x64
          - runner: macos-15
            display_name: macOS 15 ARM64
            expected_machine: arm64
            artifact: MIO-KITCHEN-macos15-arm64

    runs-on: ${{ matrix.runner }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Verify runner architecture
        run: |
          test "$(uname -m)" = "${{ matrix.expected_machine }}"
          sw_vers

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install dependencies
        run: python -m pip install -r requirements.txt

      - name: Build macOS 15
        run: python build.py --target-os macos15 --skip-install

      - name: Upload macOS artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: ${{ matrix.artifact }}.zip
          if-no-files-found: error
          retention-days: 14

  release:
    name: Publish GitHub release
    needs:
      - build-windows
      - build-linux
      - build-macos
    runs-on: ubuntu-24.04
    if: >-
      ${{
        !cancelled() &&
        needs.build-windows.result == 'success' &&
        needs.build-linux.result == 'success' &&
        needs.build-macos.result == 'success' &&
        (
          startsWith(github.ref, 'refs/tags/v') ||
          startsWith(github.ref, 'refs/tags/CI_BUILD_') ||
          (github.event_name == 'workflow_dispatch' && inputs.publish_release)
        )
      }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Download build artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: MIO-KITCHEN-*
          path: release-assets
          merge-multiple: true

      - name: Verify release archives
        shell: bash
        run: |
          set -euo pipefail
          expected=(
            MIO-KITCHEN-win.x64.zip
            MIO-KITCHEN-ubuntu24.04-x64.zip
            MIO-KITCHEN-macos15-intel-x64.zip
            MIO-KITCHEN-macos15-arm64.zip
          )
          for archive in "${expected[@]}"; do
            test -s "release-assets/${archive}"
            unzip -tq "release-assets/${archive}"
          done
          test "$(find release-assets -maxdepth 1 -type f -name 'MIO-KITCHEN-*.zip' | wc -l | tr -d ' ')" = "4"
          ls -lh release-assets/MIO-KITCHEN-*.zip

      - name: Resolve release metadata
        id: release_meta
        shell: bash
        env:
          MANUAL_RELEASE_TAG: ${{ inputs.release_tag }}
          MANUAL_PRERELEASE: ${{ inputs.prerelease }}
        run: |
          set -euo pipefail
          version="$(python - <<'PY'
          import configparser
          parser = configparser.ConfigParser()
          parser.read('config/settings.ini', encoding='utf-8')
          print(parser.get('setting', 'version'))
          PY
          )"

          if [[ "${GITHUB_REF}" == refs/tags/* ]]; then
            tag="${GITHUB_REF_NAME}"
          elif [[ -n "${MANUAL_RELEASE_TAG:-}" ]]; then
            tag="${MANUAL_RELEASE_TAG}"
          else
            tag="v${version}-build.${GITHUB_RUN_NUMBER}"
          fi

          prerelease="false"
          if [[ "${GITHUB_REF}" == refs/tags/CI_BUILD_* ]]; then
            prerelease="true"
          elif [[ "${GITHUB_EVENT_NAME}" == "workflow_dispatch" && "${MANUAL_PRERELEASE:-false}" == "true" ]]; then
            prerelease="true"
          fi

          echo "version=${version}" >> "${GITHUB_OUTPUT}"
          echo "tag=${tag}" >> "${GITHUB_OUTPUT}"
          echo "title=MIO Kitchen ${version}" >> "${GITHUB_OUTPUT}"
          echo "prerelease=${prerelease}" >> "${GITHUB_OUTPUT}"

      - name: Generate release notes
        run: python build.py grb --target-os ubuntu24.04 --skip-install

      - name: Create or update GitHub Release
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
          RELEASE_TAG: ${{ steps.release_meta.outputs.tag }}
          RELEASE_TITLE: ${{ steps.release_meta.outputs.title }}
          RELEASE_PRERELEASE: ${{ steps.release_meta.outputs.prerelease }}
        run: |
          set -euo pipefail
          if gh release view "${RELEASE_TAG}" >/dev/null 2>&1; then
            gh release upload "${RELEASE_TAG}" release-assets/MIO-KITCHEN-*.zip --clobber
            gh release edit "${RELEASE_TAG}" --title "${RELEASE_TITLE}" --notes-file body.md
          else
            args=(
              release create "${RELEASE_TAG}"
              release-assets/MIO-KITCHEN-*.zip
              --title "${RELEASE_TITLE}"
              --notes-file body.md
            )
            if [[ "${RELEASE_PRERELEASE}" == "true" ]]; then
              args+=(--prerelease)
            fi
            gh "${args[@]}"
          fi

      - name: Write release summary
        shell: bash
        env:
          RELEASE_TAG: ${{ steps.release_meta.outputs.tag }}
        run: |
          {
            echo "## Published release"
            echo
            echo "Tag: \`${RELEASE_TAG}\`"
            echo
            echo "Uploaded archives:"
            for archive in release-assets/MIO-KITCHEN-*.zip; do
              echo "* \`$(basename "${archive}")\`"
            done
          } >> "${GITHUB_STEP_SUMMARY}"
