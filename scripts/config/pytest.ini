[pytest]
testpaths = tests
python_files = test_*.py
markers =
    gui: tests that need a Tk display
    smoke: script-style smoke coverage wrapped for pytest/CI
    external: checks that validate optional or platform-specific external dependencies/assets
addopts = -ra -p no:pytest_cov -p no:asyncio -p no:pytest_jsonreport -p no:anyio -p no:metadata -p no:faker -p no:ddtrace
